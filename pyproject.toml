[project]
name = "rag-engine"
version = "0.1.0"
description = "Production-grade RAG system: FAISS indexing, agentic multi-hop reasoning, eval-gated CI."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "optimum[onnxruntime]>=2.1.0",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.3",
    "sentence-transformers>=5.5.1",
    "structlog>=24.1",
    "tqdm>=4.68.2",
]

[dependency-groups]
dev = [
    "mypy>=1.10",
    "pip-audit>=2.7",
    "pre-commit>=3.7",
    "pytest>=8.2",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_engine"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["rag_engine"]

[tool.mypy]
strict = true
python_version = "3.12"
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
