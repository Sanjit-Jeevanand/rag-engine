[project]
name = "rag-engine"
version = "0.1.0"
description = "Production-grade RAG system: HNSW indexing, agentic multi-hop reasoning, eval-gated CI."
readme = "README.md"
requires-python = ">=3.12"
dependencies = []
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_engine"]

[dependency-groups]
dev = [
    "mypy>=1.10",
    "pip-audit>=2.7",
    "pre-commit>=3.7",
    "pytest>=8.2",
    "ruff>=0.4",
]